name: Frontend Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  standalone:
    name: Validate Frontend Standalone
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout frontend branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Materialize standalone shared-package shims
        run: |
          mkdir -p ../packages
          rsync -a ./.ci/root-workspace/packages/migration-contract/ ../packages/migration-contract/
          cp ./.ci/root-workspace/tsconfig.base.json ../tsconfig.base.json

      - name: Install frontend dependencies
        run: npm install

      - name: Run frontend tests
        run: npm test

      - name: Run frontend typecheck
        run: npm run typecheck
